<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | iOnline Refurbished - Intelligent Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #F69322;
            --primary-dark: #e08510;
            --grey: #4D4D4F;
            --white: #FFFFFF;
            --dark: #1a1a1a;
            --card-bg: #2a2a2a;
            --text: #e0e0e0;
            --text-muted: #8e96b0;
            --success: #4caf50;
            --warning: #ff9800;
            --danger: #f44336;
            --info: #2196f3;
        }
        body {
            background: linear-gradient(135deg, var(--dark) 0%, #0a0a0a 100%);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        .admin-header {
            background: linear-gradient(135deg, var(--grey) 0%, #2a2a2a 100%);
            padding: 20px 0;
            margin-bottom: 30px;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        .logo {
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--white);
            text-decoration: none;
        }
        .logo span { color: var(--primary); }
        .stat-card {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            border-left: 4px solid var(--primary);
            transition: all 0.3s;
            cursor: pointer;
            margin-bottom: 20px;
        }
        .stat-card:hover { transform: translateY(-5px); box-shadow: 0 10px 25px rgba(0,0,0,0.3); }
        .stat-number { font-size: 2.5rem; font-weight: 800; color: var(--primary); margin-bottom: 5px; }
        .stat-label { font-size: 0.85rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; }
        .order-card {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            border-left: 5px solid;
            transition: all 0.2s;
            cursor: pointer;
        }
        .order-card:hover { transform: translateX(5px); background: rgba(246,147,34,0.05); }
        .status-pending { border-left-color: var(--warning); }
        .status-confirmed { border-left-color: var(--success); }
        .status-shipped { border-left-color: var(--info); }
        .status-delivered { border-left-color: #9c27b0; }
        .status-cancelled { border-left-color: var(--danger); }
        .badge-pending { background: var(--warning); color: var(--dark); }
        .badge-confirmed { background: var(--success); }
        .badge-shipped { background: var(--info); }
        .badge-delivered { background: #9c27b0; }
        .badge-cancelled { background: var(--danger); }
        .order-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .order-id { font-size: 1.3rem; font-weight: 700; }
        .order-status select {
            background: var(--dark);
            border: 1px solid var(--grey);
            color: var(--text);
            padding: 8px 15px;
            border-radius: 50px;
            font-size: 0.85rem;
        }
        .order-details {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
            margin-bottom: 15px;
        }
        .detail-box {
            background: rgba(0,0,0,0.3);
            border-radius: 12px;
            padding: 12px;
        }
        .detail-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            color: var(--primary);
            letter-spacing: 1px;
            margin-bottom: 5px;
        }
        .detail-value { font-size: 0.95rem; font-weight: 500; word-break: break-word; }
        .items-list {
            background: rgba(0,0,0,0.2);
            border-radius: 12px;
            padding: 12px;
            margin-top: 10px;
        }
        .item-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .item-row:last-child { border-bottom: none; }
        .message-section {
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid rgba(255,255,255,0.1);
        }
        .reply-input {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }
        .reply-input textarea {
            flex: 1;
            background: var(--dark);
            border: 1px solid var(--grey);
            border-radius: 15px;
            padding: 10px;
            color: var(--text);
            resize: vertical;
        }
        .reply-input button {
            background: var(--primary);
            border: none;
            border-radius: 15px;
            padding: 0 20px;
            color: var(--dark);
            font-weight: 600;
        }
        .action-buttons {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            flex-wrap: wrap;
        }
        .btn-view { background: var(--primary); border: none; border-radius: 50px; padding: 8px 20px; color: var(--dark); font-weight: 600; transition: all 0.2s; }
        .btn-view:hover { transform: scale(1.02); }
        .btn-call { background: var(--info); border: none; border-radius: 50px; padding: 8px 20px; color: white; font-weight: 600; }
        .btn-cancel { background: var(--danger); border: none; border-radius: 50px; padding: 8px 20px; color: white; font-weight: 600; }
        .modal-content { background: var(--card-bg); color: var(--text); border: 1px solid var(--primary); }
        .message-bubble {
            background: var(--dark);
            border-radius: 15px;
            padding: 12px 15px;
            margin-bottom: 12px;
            max-width: 85%;
        }
        .message-bubble.admin { background: var(--primary); color: var(--dark); margin-left: auto; }
        .message-bubble.customer { background: var(--grey); }
        .notification-badge { position: relative; cursor: pointer; }
        .notification-count {
            position: absolute;
            top: -8px;
            right: -12px;
            background: var(--danger);
            color: white;
            border-radius: 50%;
            width: 18px;
            height: 18px;
            font-size: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .filter-tabs { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        .filter-btn {
            background: transparent;
            border: 1px solid var(--grey);
            border-radius: 50px;
            padding: 8px 20px;
            color: var(--text);
            transition: all 0.2s;
        }
        .filter-btn.active, .filter-btn:hover { background: var(--primary); border-color: var(--primary); color: var(--dark); }
        .refresh-btn { background: var(--primary); border: none; border-radius: 50px; padding: 8px 20px; color: var(--dark); font-weight: 600; }
        .search-box { position: relative; margin-bottom: 20px; }
        .search-box input {
            width: 100%;
            padding: 12px 20px;
            background: var(--dark);
            border: 1px solid var(--grey);
            border-radius: 50px;
            color: var(--text);
        }
        .search-box i { position: absolute; right: 15px; top: 50%; transform: translateY(-50%); color: var(--primary); }
        .inventory-table { background: var(--card-bg); border-radius: 20px; padding: 20px; margin-bottom: 20px; }
        .sales-chart { background: var(--card-bg); border-radius: 20px; padding: 20px; margin-bottom: 20px; }
        table { color: var(--text); }
        th { color: var(--primary); border-bottom-color: var(--primary); }
        .call-log {
            background: rgba(0,0,0,0.2);
            border-radius: 10px;
            padding: 10px;
            margin-top: 10px;
            max-height: 150px;
            overflow-y: auto;
        }
        .call-entry {
            padding: 5px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            font-size: 0.8rem;
        }
        @media (max-width: 768px) {
            .order-header { flex-direction: column; align-items: flex-start; gap: 10px; }
            .order-details { grid-template-columns: 1fr; }
            .reply-input { flex-direction: column; }
        }
    </style>
</head>
<body>

<div class="admin-header">
    <div class="container">
        <div class="d-flex justify-content-between align-items-center">
            <div>
                <a href="/phones" class="logo">iOnline<span>Admin</span></a>
                <p class="mb-0 small text-muted">Intelligent Order Management & Analytics</p>
            </div>
            <div class="d-flex gap-3 align-items-center">
                <div class="notification-badge" onclick="showNotifications()">
                    <i class="bi bi-bell fs-4" style="color: var(--white);"></i>
                    <span id="notification-count" class="notification-count" style="display: none;">0</span>
                </div>
                <button class="btn btn-outline-light btn-sm" onclick="exportOrders()"><i class="bi bi-download"></i> Export CSV</button>
                <a href="/phones" class="btn btn-outline-light btn-sm"><i class="bi bi-shop"></i> View Store</a>
                <button class="refresh-btn btn-sm" onclick="loadAllData()"><i class="bi bi-arrow-repeat"></i> Refresh</button>
            </div>
        </div>
    </div>
</div>

<div class="container">
    <!-- Stats Row -->
    <div class="row g-3 mb-4">
        <div class="col-md-3 col-6">
            <div class="stat-card" onclick="filterOrders('all')">
                <div class="stat-number" id="total-orders">0</div>
                <div class="stat-label">Total Orders</div>
            </div>
        </div>
        <div class="col-md-3 col-6">
            <div class="stat-card" onclick="filterOrders('pending')">
                <div class="stat-number" id="pending-orders">0</div>
                <div class="stat-label">Pending</div>
            </div>
        </div>
        <div class="col-md-3 col-6">
            <div class="stat-card" onclick="filterOrders('delivered')">
                <div class="stat-number" id="completed-orders">0</div>
                <div class="stat-label">Completed</div>
            </div>
        </div>
        <div class="col-md-3 col-6">
            <div class="stat-card">
                <div class="stat-number" id="total-revenue">KES 0</div>
                <div class="stat-label">Total Revenue</div>
            </div>
        </div>
    </div>

    <!-- Sales Chart -->
    <div class="sales-chart">
        <h5><i class="bi bi-bar-chart"></i> Sales by Model</h5>
        <canvas id="salesChart" height="100"></canvas>
    </div>

    <!-- Inventory Summary -->
    <div class="inventory-table">
        <h5><i class="bi bi-box-seam"></i> Inventory & Ratings Summary</h5>
        <div class="table-responsive">
            <table class="table">
                <thead>
                    <tr><th>Model</th><th>Storage</th><th>Sold</th><th>Remaining</th><th>Avg Rating</th><th>Status</th></tr>
                </thead>
                <tbody id="inventory-body"></tbody>
            </table>
        </div>
    </div>

    <!-- Search Box -->
    <div class="search-box">
        <input type="text" id="search-orders" placeholder="Search by customer name, phone, or order ID..." onkeyup="searchOrders()">
        <i class="bi bi-search"></i>
    </div>

    <!-- Filter Tabs -->
    <div class="filter-tabs">
        <button class="filter-btn active" data-filter="all" onclick="filterOrders('all')">All Orders</button>
        <button class="filter-btn" data-filter="pending" onclick="filterOrders('pending')">Pending</button>
        <button class="filter-btn" data-filter="confirmed" onclick="filterOrders('confirmed')">Confirmed</button>
        <button class="filter-btn" data-filter="shipped" onclick="filterOrders('shipped')">Shipped</button>
        <button class="filter-btn" data-filter="delivered" onclick="filterOrders('delivered')">Delivered</button>
        <button class="filter-btn" data-filter="cancelled" onclick="filterOrders('cancelled')">Cancelled</button>
    </div>

    <!-- Bulk Actions -->
    <div class="mb-3 d-flex gap-2">
        <select id="bulk-status" class="form-select" style="width: auto; background: var(--dark);">
            <option value="">Bulk Action</option>
            <option value="confirmed">Confirm Selected</option>
            <option value="shipped">Mark as Shipped</option>
            <option value="delivered">Mark as Delivered</option>
            <option value="cancelled">Cancel Selected</option>
        </select>
        <button class="btn btn-primary" onclick="bulkUpdateStatus()">Apply to Selected</button>
        <button class="btn btn-outline-secondary" onclick="selectAllOrders()">Select All</button>
    </div>

    <!-- Orders List -->
    <div id="orders-container">
        <div class="text-center py-5">
            <div class="spinner-border text-primary" role="status"></div>
            <p class="mt-2">Loading orders...</p>
        </div>
    </div>
</div>

<!-- Order Details Modal -->
<div class="modal fade" id="orderModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header border-primary">
                <h5 class="modal-title" id="modal-title">Order Details</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body" id="modal-body">Loading...</div>
            <div class="modal-footer border-primary">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    let socket = io();
    let orders = [];
    let allPhones = [];
    let currentFilter = 'all';
    let unreadMessages = {};
    let selectedOrders = new Set();
    let salesChart = null;
    let ratings = JSON.parse(localStorage.getItem('productRatings') || '{}');

    socket.on('connect', function() { console.log('Connected to real-time server'); });
    socket.on('customer_message', function(data) {
        showToast(`📬 New message from ${data.customer_name} for Order #${data.order_id}`);
        unreadMessages[data.order_id] = true;
        updateNotificationBadge();
        loadAllData();
    });
    socket.on('order_reply', function(data) {
        showToast(`✅ Reply sent to ${data.customer_name} for Order #${data.order_id}`);
        loadAllData();
    });

    function updateNotificationBadge() {
        let count = Object.keys(unreadMessages).length;
        let badge = document.getElementById('notification-count');
        badge.style.display = count > 0 ? 'flex' : 'none';
        if (count > 0) badge.innerText = count;
    }

    function showNotifications() {
        let message = Object.keys(unreadMessages).map(id => `Order #${id} has new messages`).join('\n');
        if (message) { alert(`📬 New Messages:\n${message}`); unreadMessages = {}; updateNotificationBadge(); }
        else alert('No new messages');
    }

    async function loadAllData() {
        await loadOrders();
        await loadPhones();
        updateStats();
        updateInventoryTable();
        updateSalesChart();
    }

    async function loadOrders() {
        try {
            let res = await fetch('/api/orders');
            orders = await res.json();
            renderOrders();
        } catch(e) { console.error(e); }
    }

    async function loadPhones() {
        try {
            let res = await fetch('/api/phones');
            allPhones = await res.json();
        } catch(e) { console.error(e); }
    }

    function getAverageRating(productId) {
        if (!ratings[productId] || ratings[productId].length === 0) return 0;
        let sum = ratings[productId].reduce((a, b) => a + b, 0);
        return (sum / ratings[productId].length).toFixed(1);
    }

    function updateInventoryTable() {
        let tbody = document.getElementById('inventory-body');
        let salesByModel = {};
        orders.filter(o => o.status === 'delivered').forEach(order => {
            order.items.forEach(item => {
                let key = `${item.model} ${item.storage}`;
                salesByModel[key] = (salesByModel[key] || 0) + item.quantity;
            });
        });
        let html = '';
        allPhones.forEach(phone => {
            let key = `${phone.model} ${phone.storage}`;
            let sold = salesByModel[key] || 0;
            let stock = (phone.stock || 15) - sold;
            let avgRating = getAverageRating(phone.id);
            let statusColor = stock > 10 ? 'success' : (stock > 0 ? 'warning' : 'danger');
            let statusText = stock > 10 ? 'In Stock' : (stock > 0 ? 'Low Stock' : 'Out of Stock');
            let ratingStars = '';
            for (let i = 1; i <= 5; i++) {
                ratingStars += `<i class="bi bi-star${i <= Math.floor(avgRating) ? '-fill' : ''}" style="color: var(--warning); font-size: 0.8rem;"></i>`;
            }
            html += `<tr>
                        <td>${phone.model}</td>
                        <td>${phone.storage}</td>
                        <td>${sold}</td>
                        <td>${Math.max(0, stock)}</td>
                        <td>${ratingStars} (${avgRating})</td>
                        <td><span class="badge bg-${statusColor}">${statusText}</span></td>
                     </tr>`;
        });
        tbody.innerHTML = html;
    }

    function updateSalesChart() {
        let salesByModel = {};
        orders.filter(o => o.status === 'delivered').forEach(order => {
            order.items.forEach(item => {
                let model = item.model;
                salesByModel[model] = (salesByModel[model] || 0) + item.quantity;
            });
        });
        let models = Object.keys(salesByModel).slice(0, 10);
        let counts = models.map(m => salesByModel[m]);
        if (salesChart) salesChart.destroy();
        let ctx = document.getElementById('salesChart').getContext('2d');
        salesChart = new Chart(ctx, {
            type: 'bar',
            data: { labels: models, datasets: [{ label: 'Units Sold', data: counts, backgroundColor: '#F69322', borderRadius: 10 }] },
            options: { responsive: true, maintainAspectRatio: true, plugins: { legend: { labels: { color: '#e0e0e0' } } } }
        });
    }

    function searchOrders() {
        renderOrders();
    }

    function selectAllOrders() {
        let filtered = getFilteredOrders();
        filtered.forEach(order => selectedOrders.add(order.id));
        renderOrders();
        showToast(`${selectedOrders.size} orders selected`);
    }

    function getFilteredOrders() {
        let searchTerm = document.getElementById('search-orders')?.value.toLowerCase() || '';
        let filtered = currentFilter === 'all' ? orders : orders.filter(o => o.status === currentFilter);
        if (searchTerm) {
            filtered = filtered.filter(o => 
                o.id.toString().includes(searchTerm) ||
                o.customer_name.toLowerCase().includes(searchTerm) ||
                o.customer_phone.includes(searchTerm)
            );
        }
        return filtered;
    }

    async function bulkUpdateStatus() {
        let newStatus = document.getElementById('bulk-status').value;
        if (!newStatus || selectedOrders.size === 0) { alert('Select orders and a status'); return; }
        for (let orderId of selectedOrders) {
            await fetch(`/api/orders/${orderId}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ status: newStatus })
            });
        }
        selectedOrders.clear();
        loadAllData();
        showToast(`${selectedOrders.size} orders updated to ${newStatus}`);
    }

    function toggleSelectOrder(orderId) {
        if (selectedOrders.has(orderId)) selectedOrders.delete(orderId);
        else selectedOrders.add(orderId);
        renderOrders();
    }

    function renderOrders() {
        let container = document.getElementById('orders-container');
        let filtered = getFilteredOrders();
        if (filtered.length === 0) {
            container.innerHTML = '<div class="text-center py-5 text-muted"><i class="bi bi-inbox fs-1"></i><p class="mt-2">No orders found</p></div>';
            return;
        }
        let html = '';
        filtered.slice().reverse().forEach(order => {
            let statusClass = '';
            let statusBadge = '';
            switch(order.status) {
                case 'pending': statusClass = 'status-pending'; statusBadge = 'badge-pending'; break;
                case 'confirmed': statusClass = 'status-confirmed'; statusBadge = 'badge-confirmed'; break;
                case 'shipped': statusClass = 'status-shipped'; statusBadge = 'badge-shipped'; break;
                case 'delivered': statusClass = 'status-delivered'; statusBadge = 'badge-delivered'; break;
                case 'cancelled': statusClass = 'status-cancelled'; statusBadge = 'badge-cancelled'; break;
                default: statusClass = 'status-pending'; statusBadge = 'badge-pending';
            }
            let itemsList = order.items.map(i => `${i.model} ${i.storage} (x${i.quantity})`).join(', ');
            let amount = order.currency === 'kes' ? `KES ${order.total_kes?.toLocaleString()}` : `$${order.total_usd?.toLocaleString()}`;
            let date = new Date(order.created_at).toLocaleString();
            let hasUnread = unreadMessages[order.id];
            let isSelected = selectedOrders.has(order.id);
            html += `
                <div class="order-card ${statusClass}" style="${isSelected ? 'border: 2px solid var(--primary);' : ''}">
                    <div class="order-header">
                        <div class="order-id">
                            <input type="checkbox" class="me-2" onchange="toggleSelectOrder(${order.id})" ${isSelected ? 'checked' : ''}>
                            Order #${order.id}
                            <span class="badge ${statusBadge} ms-2">${order.status.toUpperCase()}</span>
                            ${hasUnread ? '<span class="badge bg-danger ms-2">📬 New Message</span>' : ''}
                        </div>
                        <div class="order-status">
                            <span class="fw-bold fs-5 me-3">${amount}</span>
                            <select class="form-select form-select-sm d-inline-block" style="width: auto;" onclick="event.stopPropagation()" onchange="updateOrderStatus(${order.id}, this.value)">
                                <option value="pending" ${order.status === 'pending' ? 'selected' : ''}>⏳ Pending</option>
                                <option value="confirmed" ${order.status === 'confirmed' ? 'selected' : ''}>✅ Confirmed</option>
                                <option value="shipped" ${order.status === 'shipped' ? 'selected' : ''}>🚚 Shipped</option>
                                <option value="delivered" ${order.status === 'delivered' ? 'selected' : ''}>🏠 Delivered</option>
                                <option value="cancelled" ${order.status === 'cancelled' ? 'selected' : ''}>❌ Cancelled</option>
                            </select>
                        </div>
                    </div>
                    <div class="order-details">
                        <div class="detail-box">
                            <div class="detail-label"><i class="bi bi-person"></i> Customer</div>
                            <div class="detail-value"><strong>${order.customer_name}</strong></div>
                            <div class="detail-value small text-muted">📞 ${order.customer_phone}</div>
                            ${order.customer_email ? `<div class="detail-value small text-muted">📧 ${order.customer_email}</div>` : ''}
                        </div>
                        <div class="detail-box">
                            <div class="detail-label"><i class="bi bi-geo-alt"></i> Delivery Address</div>
                            <div class="detail-value">${order.delivery_address}</div>
                        </div>
                        <div class="detail-box">
                            <div class="detail-label"><i class="bi bi-calendar"></i> Order Date</div>
                            <div class="detail-value">${date}</div>
                        </div>
                    </div>
                    <div class="items-list">
                        <div class="detail-label"><i class="bi bi-box-seam"></i> Items</div>
                        ${order.items.map(item => `
                            <div class="item-row">
                                <span><strong>${item.model}</strong> ${item.storage}</span>
                                <span>x${item.quantity} = ${order.currency === 'kes' ? 'KES' : '$'} ${(order.currency === 'kes' ? item.price_kes : item.price_usd)?.toLocaleString()}</span>
                            </div>
                        `).join('')}
                        <div class="item-row fw-bold">
                            <span>Total</span>
                            <span>${amount}</span>
                        </div>
                    </div>
                    <div class="action-buttons">
                        <button class="btn-view" onclick="event.stopPropagation();showOrderDetails(${order.id})">
                            <i class="bi bi-chat-dots"></i> View & Reply
                        </button>
                        <button class="btn-call" onclick="event.stopPropagation();callCustomer('${order.customer_phone}')">
                            <i class="bi bi-telephone"></i> Call Customer
                        </button>
                        ${order.status !== 'cancelled' && order.status !== 'delivered' ? `
                            <button class="btn-cancel" onclick="event.stopPropagation();updateOrderStatus(${order.id}, 'cancelled')">
                                <i class="bi bi-x-circle"></i> Cancel Order
                            </button>
                        ` : ''}
                    </div>
                </div>
            `;
        });
        container.innerHTML = html;
    }

    async function showOrderDetails(orderId) {
        let order = orders.find(o => o.id === orderId);
        if (!order) return;
        delete unreadMessages[orderId];
        updateNotificationBadge();
        let messages = await loadOrderMessages(orderId);
        let messagesHtml = '';
        if (messages && messages.length > 0) {
            messagesHtml = '<hr><h6><i class="bi bi-chat-dots"></i> Conversation</h6><div style="max-height: 300px; overflow-y: auto;">';
            messages.forEach(msg => {
                let bubbleClass = msg.from_admin ? 'admin' : 'customer';
                let senderName = msg.from_admin ? 'Admin' : (msg.customer_name || 'Customer');
                messagesHtml += `<div class="message-bubble ${bubbleClass}"><strong>${senderName}</strong><br>${msg.message}<br><small>${new Date(msg.timestamp).toLocaleString()}</small></div>`;
            });
            messagesHtml += '</div>';
        }
        let amount = order.currency === 'kes' ? `KES ${order.total_kes?.toLocaleString()}` : `$${order.total_usd?.toLocaleString()}`;
        let itemsHtml = order.items.map(i => `${i.model} ${i.storage} - ${order.currency === 'kes' ? 'KES' : '$'} ${(order.currency === 'kes' ? i.price_kes : i.price_usd)?.toLocaleString()} (x${i.quantity})`).join('<br>');
        document.getElementById('modal-title').innerHTML = `Order #${order.id} - ${order.customer_name}`;
        document.getElementById('modal-body').innerHTML = `
            <div class="row">
                <div class="col-md-6">
                    <div class="detail-box mb-2">
                        <div class="detail-label">Customer Details</div>
                        <div class="detail-value"><strong>${order.customer_name}</strong></div>
                        <div class="detail-value">📞 ${order.customer_phone}</div>
                        ${order.customer_email ? `<div class="detail-value">📧 ${order.customer_email}</div>` : ''}
                        <div class="detail-value mt-2">📍 ${order.delivery_address}</div>
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="detail-box mb-2">
                        <div class="detail-label">Order Items</div>
                        <div class="detail-value">${itemsHtml}</div>
                        <hr>
                        <div class="detail-value fw-bold">Total: ${amount}</div>
                        <div class="detail-value small text-muted">📅 ${new Date(order.created_at).toLocaleString()}</div>
                    </div>
                </div>
            </div>
            ${messagesHtml}
            <hr>
            <div class="mt-3">
                <label><i class="bi bi-reply"></i> Reply to Customer</label>
                <textarea id="reply-message" class="form-control" rows="3" placeholder="Type your response..."></textarea>
                <button class="btn btn-primary mt-2" onclick="sendReply(${order.id})">Send Reply</button>
            </div>
            <div class="mt-3">
                <label><i class="bi bi-pencil"></i> Internal Notes</label>
                <textarea id="internal-notes" class="form-control" rows="2" placeholder="Add internal notes..."></textarea>
                <button class="btn btn-outline-secondary mt-1 btn-sm" onclick="addInternalNote(${order.id})">Save Note</button>
            </div>
        `;
        new bootstrap.Modal(document.getElementById('orderModal')).show();
    }

    async function addInternalNote(orderId) {
        let note = document.getElementById('internal-notes').value;
        if (!note) return;
        await fetch(`/api/orders/${orderId}/notes`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ note: note, timestamp: new Date().toISOString() })
        });
        showToast('Note added');
        document.getElementById('internal-notes').value = '';
    }

    async function loadOrderMessages(orderId) {
        try { let res = await fetch(`/api/orders/${orderId}/messages`); return await res.json(); } catch(e) { return []; }
    }

    async function sendReply(orderId) {
        let message = document.getElementById('reply-message').value;
        if (!message.trim()) { alert('Enter a message'); return; }
        await fetch(`/api/orders/${orderId}/reply`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ message: message })
        });
        document.getElementById('reply-message').value = '';
        showToast('Reply sent!');
        loadAllData();
    }

    async function updateOrderStatus(orderId, newStatus) {
        await fetch(`/api/orders/${orderId}`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ status: newStatus })
        });
        loadAllData();
        showToast(`Order #${orderId} updated to ${newStatus}`);
    }

    function callCustomer(phone) {
        window.location.href = `tel:${phone}`;
        showToast(`Calling ${phone}...`);
    }

    function exportOrders() {
        let csv = "Order ID,Customer Name,Phone,Address,Items,Total,Status,Date\n";
        orders.forEach(order => {
            let items = order.items.map(i => `${i.model} ${i.storage}(x${i.quantity})`).join('; ');
            csv += `${order.id},${order.customer_name},${order.customer_phone},${order.delivery_address},${items},${order.total_kes},${order.status},${order.created_at}\n`;
        });
        let blob = new Blob([csv], { type: 'text/csv' });
        let link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = `orders_${new Date().toISOString().split('T')[0]}.csv`;
        link.click();
        showToast('Orders exported!');
    }

    function updateStats() {
        let total = orders.length;
        let pending = orders.filter(o => o.status === 'pending').length;
        let completed = orders.filter(o => o.status === 'delivered').length;
        let revenue = orders.reduce((sum, o) => sum + (o.total_kes || 0), 0);
        document.getElementById('total-orders').innerHTML = total;
        document.getElementById('pending-orders').innerHTML = pending;
        document.getElementById('completed-orders').innerHTML = completed;
        document.getElementById('total-revenue').innerHTML = `KES ${revenue.toLocaleString()}`;
    }

    function filterOrders(status) {
        currentFilter = status;
        document.querySelectorAll('.filter-btn').forEach(btn => {
            if (btn.getAttribute('data-filter') === status) btn.classList.add('active');
            else btn.classList.remove('active');
        });
        renderOrders();
    }

    function showToast(message) {
        let toast = document.createElement('div');
        toast.className = 'position-fixed bottom-0 end-0 m-3 bg-success text-white p-3 rounded shadow';
        toast.style.zIndex = '9999';
        toast.innerHTML = `<i class="bi bi-check-circle"></i> ${message}`;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }

    loadAllData();
    setInterval(loadAllData, 30000);
</script>
</body>
</html>
